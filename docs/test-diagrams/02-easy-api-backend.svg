<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" font-family="Arial, sans-serif" font-size="12">
  <rect width="700" height="350" fill="#1a1a2e" rx="8"/>
  <text x="350" y="25" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="bold">REST API Backend Architecture</text>
  <text x="350" y="42" text-anchor="middle" fill="#888" font-size="10">Difficulty: Easy-Medium</text>

  <!-- Client -->
  <rect x="30" y="130" width="100" height="60" rx="8" fill="#2d3748" stroke="#63b3ed" stroke-width="2"/>
  <text x="80" y="155" text-anchor="middle" fill="#e0e0e0" font-size="11">Mobile App</text>
  <text x="80" y="172" text-anchor="middle" fill="#63b3ed" font-size="10">React Native</text>

  <!-- ALB -->
  <rect x="190" y="130" width="110" height="60" rx="8" fill="#2d3748" stroke="#f6ad55" stroke-width="2"/>
  <text x="245" y="155" text-anchor="middle" fill="#e0e0e0" font-size="11">ALB</text>
  <text x="245" y="172" text-anchor="middle" fill="#f6ad55" font-size="10">Load Balancer</text>

  <!-- EC2 -->
  <rect x="360" y="80" width="110" height="50" rx="8" fill="#2d3748" stroke="#fc8181" stroke-width="2"/>
  <text x="415" y="102" text-anchor="middle" fill="#e0e0e0" font-size="11">EC2 Instance</text>
  <text x="415" y="118" text-anchor="middle" fill="#fc8181" font-size="10">Node.js API</text>

  <rect x="360" y="150" width="110" height="50" rx="8" fill="#2d3748" stroke="#fc8181" stroke-width="2"/>
  <text x="415" y="172" text-anchor="middle" fill="#e0e0e0" font-size="11">EC2 Instance</text>
  <text x="415" y="188" text-anchor="middle" fill="#fc8181" font-size="10">Node.js API</text>

  <!-- RDS -->
  <rect x="540" y="80" width="120" height="60" rx="8" fill="#2d3748" stroke="#68d391" stroke-width="2"/>
  <text x="600" y="105" text-anchor="middle" fill="#e0e0e0" font-size="11">RDS PostgreSQL</text>
  <text x="600" y="122" text-anchor="middle" fill="#68d391" font-size="10">Primary</text>

  <!-- ElastiCache -->
  <rect x="540" y="170" width="120" height="60" rx="8" fill="#2d3748" stroke="#b794f4" stroke-width="2"/>
  <text x="600" y="195" text-anchor="middle" fill="#e0e0e0" font-size="11">ElastiCache</text>
  <text x="600" y="212" text-anchor="middle" fill="#b794f4" font-size="10">Redis Cache</text>

  <!-- S3 -->
  <rect x="360" y="260" width="110" height="50" rx="8" fill="#2d3748" stroke="#f6e05e" stroke-width="2"/>
  <text x="415" y="282" text-anchor="middle" fill="#e0e0e0" font-size="11">S3 Bucket</text>
  <text x="415" y="298" text-anchor="middle" fill="#f6e05e" font-size="10">File Uploads</text>

  <!-- Arrows -->
  <defs><marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#888"/></marker></defs>
  <line x1="130" y1="160" x2="190" y2="160" stroke="#63b3ed" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="300" y1="145" x2="360" y2="105" stroke="#f6ad55" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="300" y1="170" x2="360" y2="175" stroke="#f6ad55" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="470" y1="105" x2="540" y2="105" stroke="#fc8181" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="470" y1="175" x2="540" y2="195" stroke="#fc8181" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="415" y1="200" x2="415" y2="260" stroke="#fc8181" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
</svg>

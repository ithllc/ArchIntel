<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" font-family="Arial, sans-serif" font-size="12">
  <rect width="600" height="300" fill="#1a1a2e" rx="8"/>
  <text x="300" y="25" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="bold">GCP Static Website</text>
  <text x="300" y="42" text-anchor="middle" fill="#888" font-size="10">Difficulty: Easy — Cloud Storage + Cloud CDN + Cloud DNS</text>

  <rect x="30" y="110" width="100" height="60" rx="8" fill="#2d3748" stroke="#63b3ed" stroke-width="2"/>
  <text x="80" y="135" text-anchor="middle" fill="#e0e0e0" font-size="11">Users</text>
  <text x="80" y="152" text-anchor="middle" fill="#63b3ed" font-size="10">Browser</text>

  <rect x="190" y="110" width="120" height="60" rx="8" fill="#2d3748" stroke="#4299e1" stroke-width="2"/>
  <text x="250" y="135" text-anchor="middle" fill="#e0e0e0" font-size="11">Cloud DNS</text>
  <text x="250" y="152" text-anchor="middle" fill="#4299e1" font-size="10">DNS Resolution</text>

  <rect x="370" y="60" width="130" height="60" rx="8" fill="#2d3748" stroke="#f6ad55" stroke-width="2"/>
  <text x="435" y="85" text-anchor="middle" fill="#e0e0e0" font-size="11">Cloud CDN</text>
  <text x="435" y="102" text-anchor="middle" fill="#f6ad55" font-size="10">Edge Caching</text>

  <rect x="370" y="160" width="130" height="60" rx="8" fill="#2d3748" stroke="#68d391" stroke-width="2"/>
  <text x="435" y="185" text-anchor="middle" fill="#e0e0e0" font-size="11">Cloud Storage</text>
  <text x="435" y="202" text-anchor="middle" fill="#68d391" font-size="10">Static Files (Bucket)</text>

  <rect x="190" y="220" width="120" height="50" rx="8" fill="#2d3748" stroke="#b794f4" stroke-width="2"/>
  <text x="250" y="242" text-anchor="middle" fill="#e0e0e0" font-size="11">Cloud Load</text>
  <text x="250" y="258" text-anchor="middle" fill="#b794f4" font-size="10">Balancer (HTTPS)</text>

  <defs><marker id="a6" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#888"/></marker></defs>
  <line x1="130" y1="135" x2="190" y2="135" stroke="#63b3ed" stroke-width="2" marker-end="url(#a6)"/>
  <line x1="310" y1="130" x2="370" y2="95" stroke="#4299e1" stroke-width="2" marker-end="url(#a6)"/>
  <line x1="435" y1="120" x2="435" y2="160" stroke="#f6ad55" stroke-width="2" marker-end="url(#a6)"/>
  <line x1="310" y1="145" x2="370" y2="185" stroke="#4299e1" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a6)"/>
  <line x1="250" y1="170" x2="250" y2="220" stroke="#888" stroke-width="1.5" marker-end="url(#a6)"/>

  <text x="160" y="125" text-anchor="middle" fill="#888" font-size="9">HTTPS</text>
  <text x="355" y="80" text-anchor="middle" fill="#888" font-size="9">Cache hit</text>
  <text x="455" y="145" text-anchor="middle" fill="#888" font-size="9">Origin</text>
</svg>

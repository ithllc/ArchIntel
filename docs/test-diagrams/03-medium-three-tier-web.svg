<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Arial, sans-serif" font-size="12">
  <rect width="800" height="500" fill="#1a1a2e" rx="8"/>
  <text x="400" y="25" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="bold">Three-Tier Web Application (AWS)</text>
  <text x="400" y="42" text-anchor="middle" fill="#888" font-size="10">Difficulty: Medium</text>

  <!-- Internet -->
  <rect x="330" y="55" width="140" height="40" rx="20" fill="#2d3748" stroke="#63b3ed" stroke-width="2"/>
  <text x="400" y="80" text-anchor="middle" fill="#63b3ed" font-size="11">Internet / Users</text>

  <!-- WAF -->
  <rect x="345" y="115" width="110" height="40" rx="8" fill="#2d3748" stroke="#f56565" stroke-width="2"/>
  <text x="400" y="140" text-anchor="middle" fill="#f56565" font-size="11">AWS WAF</text>

  <!-- CloudFront -->
  <rect x="330" y="175" width="140" height="40" rx="8" fill="#2d3748" stroke="#f6ad55" stroke-width="2"/>
  <text x="400" y="200" text-anchor="middle" fill="#f6ad55" font-size="11">CloudFront CDN</text>

  <!-- VPC Box -->
  <rect x="50" y="235" width="700" height="240" rx="8" fill="none" stroke="#4a5568" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="70" y="255" fill="#4a5568" font-size="11">VPC (10.0.0.0/16)</text>

  <!-- Public Subnet -->
  <rect x="70" y="265" width="300" height="85" rx="6" fill="rgba(99,179,237,0.1)" stroke="#63b3ed" stroke-width="1"/>
  <text x="85" y="280" fill="#63b3ed" font-size="10">Public Subnet</text>

  <!-- ALB -->
  <rect x="145" y="290" width="150" height="45" rx="8" fill="#2d3748" stroke="#f6ad55" stroke-width="2"/>
  <text x="220" y="310" text-anchor="middle" fill="#e0e0e0" font-size="11">Application Load</text>
  <text x="220" y="325" text-anchor="middle" fill="#f6ad55" font-size="10">Balancer (ALB)</text>

  <!-- Private Subnet App -->
  <rect x="70" y="365" width="300" height="95" rx="6" fill="rgba(252,129,129,0.1)" stroke="#fc8181" stroke-width="1"/>
  <text x="85" y="380" fill="#fc8181" font-size="10">Private Subnet (App Tier)</text>

  <!-- EC2 ASG -->
  <rect x="90" y="390" width="120" height="55" rx="8" fill="#2d3748" stroke="#fc8181" stroke-width="2"/>
  <text x="150" y="413" text-anchor="middle" fill="#e0e0e0" font-size="10">EC2 Auto Scaling</text>
  <text x="150" y="430" text-anchor="middle" fill="#fc8181" font-size="10">Group (2-6)</text>

  <rect x="230" y="390" width="120" height="55" rx="8" fill="#2d3748" stroke="#fc8181" stroke-width="2"/>
  <text x="290" y="413" text-anchor="middle" fill="#e0e0e0" font-size="10">EC2 Auto Scaling</text>
  <text x="290" y="430" text-anchor="middle" fill="#fc8181" font-size="10">Group (2-6)</text>

  <!-- Private Subnet Data -->
  <rect x="420" y="265" width="310" height="195" rx="6" fill="rgba(104,211,145,0.1)" stroke="#68d391" stroke-width="1"/>
  <text x="435" y="280" fill="#68d391" font-size="10">Private Subnet (Data Tier)</text>

  <!-- RDS -->
  <rect x="440" y="295" width="130" height="55" rx="8" fill="#2d3748" stroke="#68d391" stroke-width="2"/>
  <text x="505" y="318" text-anchor="middle" fill="#e0e0e0" font-size="11">RDS MySQL</text>
  <text x="505" y="335" text-anchor="middle" fill="#68d391" font-size="10">Multi-AZ Primary</text>

  <!-- RDS Replica -->
  <rect x="590" y="295" width="120" height="55" rx="8" fill="#2d3748" stroke="#68d391" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="650" y="318" text-anchor="middle" fill="#e0e0e0" font-size="11">RDS MySQL</text>
  <text x="650" y="335" text-anchor="middle" fill="#68d391" font-size="10">Read Replica</text>

  <!-- ElastiCache -->
  <rect x="440" y="370" width="130" height="55" rx="8" fill="#2d3748" stroke="#b794f4" stroke-width="2"/>
  <text x="505" y="393" text-anchor="middle" fill="#e0e0e0" font-size="11">ElastiCache</text>
  <text x="505" y="410" text-anchor="middle" fill="#b794f4" font-size="10">Redis Cluster</text>

  <!-- S3 -->
  <rect x="590" y="370" width="120" height="55" rx="8" fill="#2d3748" stroke="#f6e05e" stroke-width="2"/>
  <text x="650" y="393" text-anchor="middle" fill="#e0e0e0" font-size="11">S3 Bucket</text>
  <text x="650" y="410" text-anchor="middle" fill="#f6e05e" font-size="10">Assets + Logs</text>

  <!-- Arrows -->
  <defs><marker id="a3" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#888"/></marker></defs>
  <line x1="400" y1="95" x2="400" y2="115" stroke="#888" stroke-width="1.5" marker-end="url(#a3)"/>
  <line x1="400" y1="155" x2="400" y2="175" stroke="#888" stroke-width="1.5" marker-end="url(#a3)"/>
  <line x1="400" y1="215" x2="220" y2="290" stroke="#888" stroke-width="1.5" marker-end="url(#a3)"/>
  <line x1="220" y1="335" x2="150" y2="390" stroke="#888" stroke-width="1.5" marker-end="url(#a3)"/>
  <line x1="220" y1="335" x2="290" y2="390" stroke="#888" stroke-width="1.5" marker-end="url(#a3)"/>
  <line x1="350" y1="415" x2="440" y2="320" stroke="#888" stroke-width="1.5" marker-end="url(#a3)"/>
  <line x1="350" y1="420" x2="440" y2="395" stroke="#888" stroke-width="1.5" marker-end="url(#a3)"/>
  <line x1="570" y1="320" x2="590" y2="320" stroke="#68d391" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a3)"/>
</svg>

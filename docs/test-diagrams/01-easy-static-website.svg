<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" font-family="Arial, sans-serif" font-size="12">
  <rect width="600" height="300" fill="#1a1a2e" rx="8"/>
  <text x="300" y="25" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="bold">Simple Static Website Architecture</text>
  <text x="300" y="42" text-anchor="middle" fill="#888" font-size="10">Difficulty: Easy</text>

  <!-- User -->
  <rect x="30" y="100" width="100" height="60" rx="8" fill="#2d3748" stroke="#63b3ed" stroke-width="2"/>
  <text x="80" y="125" text-anchor="middle" fill="#e0e0e0" font-size="11">Users</text>
  <text x="80" y="142" text-anchor="middle" fill="#63b3ed" font-size="10">Browser</text>

  <!-- CloudFront -->
  <rect x="200" y="100" width="120" height="60" rx="8" fill="#2d3748" stroke="#f6ad55" stroke-width="2"/>
  <text x="260" y="125" text-anchor="middle" fill="#e0e0e0" font-size="11">CloudFront</text>
  <text x="260" y="142" text-anchor="middle" fill="#f6ad55" font-size="10">CDN</text>

  <!-- S3 -->
  <rect x="400" y="100" width="120" height="60" rx="8" fill="#2d3748" stroke="#68d391" stroke-width="2"/>
  <text x="460" y="125" text-anchor="middle" fill="#e0e0e0" font-size="11">S3 Bucket</text>
  <text x="460" y="142" text-anchor="middle" fill="#68d391" font-size="10">Static Files</text>

  <!-- Route 53 -->
  <rect x="200" y="200" width="120" height="60" rx="8" fill="#2d3748" stroke="#b794f4" stroke-width="2"/>
  <text x="260" y="225" text-anchor="middle" fill="#e0e0e0" font-size="11">Route 53</text>
  <text x="260" y="242" text-anchor="middle" fill="#b794f4" font-size="10">DNS</text>

  <!-- Arrows -->
  <line x1="130" y1="130" x2="200" y2="130" stroke="#63b3ed" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="320" y1="130" x2="400" y2="130" stroke="#f6ad55" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="260" y1="160" x2="260" y2="200" stroke="#b794f4" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#888"/>
    </marker>
  </defs>

  <!-- Labels -->
  <text x="165" y="120" text-anchor="middle" fill="#888" font-size="9">HTTPS</text>
  <text x="360" y="120" text-anchor="middle" fill="#888" font-size="9">Origin</text>
</svg>

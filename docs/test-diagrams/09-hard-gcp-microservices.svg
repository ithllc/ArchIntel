  <text x="232" y="303" text-anchor="middle" fill="#b794f4" font-size="9">Java · 8 replicas</text>
  <text x="232" y="315" text-anchor="middle" fill="#888" font-size="8">PCI-DSS Scope</text>

  <rect x="305" y="265" width="115" height="60" rx="8" fill="#2d3748" stroke="#fc8181" stroke-width="2"/>
  <text x="362" y="288" text-anchor="middle" fill="#e0e0e0" font-size="10">Ledger Svc</text>

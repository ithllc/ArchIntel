  <text x="660" y="422" text-anchor="middle" fill="#68d391" font-size="9">Global Transactions</text>

  <rect x="755" y="385" width="150" height="50" rx="8" fill="#2d3748" stroke="#b794f4" stroke-width="2"/>
  <text x="830" y="407" text-anchor="middle" fill="#e0e0e0" font-size="11">Bigtable</text>
  <text x="830" y="422" text-anchor="middle" fill="#b794f4" font-size="9">Time-series Ledger</text>


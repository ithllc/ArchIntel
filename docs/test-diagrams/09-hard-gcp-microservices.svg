  <text x="395" y="145" text-anchor="middle" fill="#f6ad55" font-size="11">Apigee API Gateway (Rate Limit + OAuth2)</text>

  <!-- Global LB -->
  <rect x="140" y="180" width="280" height="35" rx="8" fill="#2d3748" stroke="#f6ad55" stroke-width="2"/>

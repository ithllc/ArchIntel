  <text x="232" y="422" text-anchor="middle" fill="#f687b3" font-size="9">Report Generator</text>

  <rect x="305" y="385" width="115" height="50" rx="8" fill="#2d3748" stroke="#f687b3" stroke-width="2"/>
  <text x="362" y="407" text-anchor="middle" fill="#e0e0e0" font-size="10">Cloud Run</text>
  <text x="362" y="422" text-anchor="middle" fill="#f687b3" font-size="9">Compliance Audit</text>

  <rect x="432" y="385" width="105" height="50" rx="8" fill="#2d3748" stroke="#f687b3" stroke-width="2"/>
  <text x="484" y="407" text-anchor="middle" fill="#e0e0e0" font-size="10">Cloud Run</text>
  <text x="484" y="422" text-anchor="middle" fill="#f687b3" font-size="9">ETL Pipeline</text>


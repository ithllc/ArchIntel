  <text x="102" y="303" text-anchor="middle" fill="#68d391" font-size="9">Go · 6 replicas</text>
  <text x="102" y="315" text-anchor="middle" fill="#888" font-size="8">KYC + Profiles</text>

  <rect x="175" y="265" width="115" height="60" rx="8" fill="#2d3748" stroke="#b794f4" stroke-width="2"/>

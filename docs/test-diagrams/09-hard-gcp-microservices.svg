  <rect x="170" y="60" width="100" height="40" rx="8" fill="#2d3748" stroke="#63b3ed" stroke-width="2"/>
  <text x="220" y="85" text-anchor="middle" fill="#63b3ed" font-size="10">Mobile Apps</text>
  <rect x="290" y="60" width="100" height="40" rx="8" fill="#2d3748" stroke="#63b3ed" stroke-width="2"/>
  <text x="340" y="85" text-anchor="middle" fill="#63b3ed" font-size="10">Partner Banks</text>
  <rect x="410" y="60" width="100" height="40" rx="8" fill="#2d3748" stroke="#63b3ed" stroke-width="2"/>
  <text x="460" y="85" text-anchor="middle" fill="#63b3ed" font-size="10">IoT / POS</text>


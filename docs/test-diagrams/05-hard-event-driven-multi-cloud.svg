  <text x="95" y="268" text-anchor="middle" fill="#b794f4" font-size="9">Auth Handler</text>
  <text x="95" y="280" text-anchor="middle" fill="#888" font-size="8">Cognito + JWT</text>

  <rect x="170" y="230" width="110" height="55" rx="8" fill="#2d3748" stroke="#b794f4" stroke-width="2"/>
  <text x="225" y="253" text-anchor="middle" fill="#e0e0e0" font-size="10">Lambda</text>
  <text x="225" y="268" text-anchor="middle" fill="#b794f4" font-size="9">Command API</text>
  <text x="225" y="280" text-anchor="middle" fill="#888" font-size="8">Write Path</text>

  <rect x="300" y="230" width="110" height="55" rx="8" fill="#2d3748" stroke="#b794f4" stroke-width="2"/>
  <text x="355" y="253" text-anchor="middle" fill="#e0e0e0" font-size="10">Lambda</text>
  <text x="355" y="268" text-anchor="middle" fill="#b794f4" font-size="9">Query API</text>
  <text x="355" y="280" text-anchor="middle" fill="#888" font-size="8">Read Path (CQRS)</text>


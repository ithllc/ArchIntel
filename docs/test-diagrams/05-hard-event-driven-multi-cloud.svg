  <rect x="860" y="510" width="90" height="30" rx="6" fill="#2d3748" stroke="#4fd1c5" stroke-width="1"/>
  <text x="905" y="530" text-anchor="middle" fill="#4fd1c5" font-size="9">Grafana</text>


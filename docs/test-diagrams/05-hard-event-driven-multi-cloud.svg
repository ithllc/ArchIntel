<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" font-family="Arial, sans-serif" font-size="12">
  <rect width="1000" height="700" fill="#1a1a2e" rx="8"/>
  <text x="500" y="25" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="bold">Event-Driven Multi-Cloud Architecture</text>
  <text x="500" y="42" text-anchor="middle" fill="#888" font-size="10">Difficulty: Hard — AWS + GCP Hybrid with Event Sourcing</text>

  <!-- External Sources -->
  <rect x="30" y="60" width="120" height="45" rx="8" fill="#2d3748" stroke="#63b3ed" stroke-width="2"/>
  <text x="90" y="80" text-anchor="middle" fill="#e0e0e0" font-size="10">Web App</text>
  <text x="90" y="95" text-anchor="middle" fill="#63b3ed" font-size="9">React SPA</text>

  <rect x="170" y="60" width="120" height="45" rx="8" fill="#2d3748" stroke="#63b3ed" stroke-width="2"/>
  <text x="230" y="80" text-anchor="middle" fill="#e0e0e0" font-size="10">Mobile SDK</text>
  <text x="230" y="95" text-anchor="middle" fill="#63b3ed" font-size="9">iOS + Android</text>

  <rect x="310" y="60" width="120" height="45" rx="8" fill="#2d3748" stroke="#63b3ed" stroke-width="2"/>
  <text x="370" y="80" text-anchor="middle" fill="#e0e0e0" font-size="10">IoT Devices</text>
  <text x="370" y="95" text-anchor="middle" fill="#63b3ed" font-size="9">MQTT Protocol</text>

  <rect x="450" y="60" width="120" height="45" rx="8" fill="#2d3748" stroke="#63b3ed" stroke-width="2"/>
  <text x="510" y="80" text-anchor="middle" fill="#e0e0e0" font-size="10">Partner APIs</text>

steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-east1-docker.pkg.dev/$PROJECT_ID/archintel/app:$COMMIT_SHA'
      - '-t'
      - 'us-east1-docker.pkg.dev/$PROJECT_ID/archintel/app:latest'
      - '.'

  # Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-east1-docker.pkg.dev/$PROJECT_ID/archintel/app:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-east1-docker.pkg.dev/$PROJECT_ID/archintel/app:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'archintel'
      - '--image'
      - 'us-east1-docker.pkg.dev/$PROJECT_ID/archintel/app:$COMMIT_SHA'
      - '--platform'
      - 'managed'
      - '--region'
      - 'us-east1'
      - '--allow-unauthenticated'
      - '--port'
      - '3000'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '3'
      - '--set-env-vars'
      - 'GOOGLE_GENERATIVE_AI_API_KEY=AIzaSyCNvQtMjBdow_RChx8eVeSSZG1jjBJaqrM,NEXT_PUBLIC_SUPABASE_URL=https://placeholder.supabase.co,NEXT_PUBLIC_SUPABASE_ANON_KEY=placeholder'

images:
  - 'us-east1-docker.pkg.dev/$PROJECT_ID/archintel/app:$COMMIT_SHA'
  - 'us-east1-docker.pkg.dev/$PROJECT_ID/archintel/app:latest'

options:
  logging: CLOUD_LOGGING_ONLY
